# Stack: Postgres + API (storage local em disco) + CMS (Next) + Nginx.
# UI: http://localhost:8080  |  API (direto): http://localhost:4000
#
# Midia: ficheiros em volume Docker luditeca_storage montado em /app/storage na API.
# Nginx encaminha /media/* para a API (Fastify serve /media/*).
#
# Variáveis: ficheiro .env na raiz (ver env.vps.example).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-luditeca}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luditeca}
      POSTGRES_DB: ${POSTGRES_DB:-luditeca}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - luditeca

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-luditeca}:${POSTGRES_PASSWORD:-luditeca}@db:5432/${POSTGRES_DB:-luditeca}?schema=public
      JWT_SECRET: ${JWT_SECRET:-troque-este-segredo-em-producao-min-32-chars}
      PORT: 4000
      HOST: 0.0.0.0
      STORAGE_DRIVER: local
      LOCAL_STORAGE_DIR: /app/storage
      PUBLIC_MEDIA_BASE: ${PUBLIC_MEDIA_BASE:-http://localhost:8080/media}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080,http://localhost:3000,http://127.0.0.1:8080,http://127.0.0.1:3000}
    volumes:
      - luditeca_storage:/app/storage
    depends_on:
      - db
    ports:
      - "4000:4000"
    networks:
      - luditeca

  web:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080/api}
        NEXT_PUBLIC_MEDIA_BASE_URL: ${NEXT_PUBLIC_MEDIA_BASE_URL:-http://localhost:8080/media}
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - luditeca

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - web
      - api
    networks:
      - luditeca

volumes:
  pgdata:
  luditeca_storage:

networks:
  luditeca:
